  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));

    return btoa(bin);

    // events at the element — warn only; real JS errors carry message/error.

        e.target.tagName, String(e.target.src || e.target.href || ''));

    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';

      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;

            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });

        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ses)\",maxPrise:1000,maxJour:4000,note:\"Sirop 2,4 % : pipette graduée en kg → remplir jusqu'au poids.\"},forms:[{l:\"Sirop 2,4 % (24 mg/ml)\",c:24},{l:\"Sachet / suppositoire (dose la plus proche)\"},{l:\"Cp 500 mg / 1 g\"}],adulte:\"500 mg à 1 g toutes les 6 h — max 4 g/j (3 g si fragile).\",g:{s:\"ok\",t:\"Antalgique-antipyrétique de référence.\"},a:{s:\"w\",t:\"Max 3 g/j si petit poids, dénutrition.\"},r:{s:\"w\",t:\"DFG &lt; 30 : espacer d'au moins 6-8 h.\"},h:{s:\"w\",t:\"Max 2-3 g/j ; éviter si hépatopathie sévère ou alcoolisme.\"}},\n     {id:\"aas\",nom:\"Acide acétylsalicylique\",cls:AP,tag:\"Aspégic\",ped:{perDayKg:50,prises:4,freq:\"réparti toutes les 4 à 6 h\",note:\"Usage restreint (Kawasaki, rhumatologie…) — pas en antipyrétique de routine. Jamais si varicelle, grippe ou dengue possible (Reye, saignement).\"},adulte:\"500 mg à 1 g ×3/j max (3 g/j) — mêmes restrictions.\",g:{s:\"ci\",t:\"CI dès 24 SA à dose antalgique ; éviter avant.\"},a:{s:\"w\",t:\"Risque hémorragique et rénal — prudence.\"},r:{s:\"ci\",t:\"À éviter ; CI si DFG &lt; 30.\"},h:{s:\"ci\",t:\"À éviter (risque hémorragique).\"}},\n     {id:\"ibu\",nom:\"Ibuprofène\",cls:NS,tag:\"AINS\",ped:{perKg:10,freq:\"toutes les 8 h\",maxPrise:400,maxJour:1200,minM:3,note:\"Éviter : varicelle, déshydratation, dengue possible, infection sévère.\"},forms:[{l:\"Sirop 20 mg/ml\",c:20},{l:\"Cp 200 / 400 mg\"}],adulte:\"200-400 mg ×3/j — max 1 200 mg/j, durée courte.\",g:{s:\"ci\",t:\"CI formelle dès 24 SA ; à éviter avant.\"},a:{s:\"w\",t:\"Prudence : rein, ulcère, HTA.\"},r:{s:\"ci\",t:\"À éviter ; CI si DFG &lt; 30.\"},h:{s:\"ci\",t:\"À éviter (saignement, rétention hydrosodée).\"}},\n     {id:\"niflu\",nom:\"Acide niflumique (Nifluril)\",cls:NS,tag:\"Suppo 400 mg\",ped:{perKg:0.1,unit:\"suppositoire(s)\",round:\"floor\",freq:\"par jour (1 suppo / 10 kg / j)\",maxPrise:3,minM:6,note:\"Mêmes précautions que tout AINS.\"},adulte:\"700 mg ×2/j max (formes adulte).\",g:{s:\"ci\",t:\"CI dès 24 SA.\"},a:{s:\"w\",t:\"Prudence AINS.\"},r:{s:\"ci\",t:\"À éviter ; CI si DFG &lt; 30.\"},h:{s:\"ci\",t:\"À éviter.\"}},\n     {id:\"indo\",nom:\"Indométacine (Indocid)\",cls:NS,tag:\"Hospitalier\",hosp:true,fixed:\"<b>PCA du prématuré<\u002Fb> : 0,2 mg/kg IV toutes les 12 h — surveillance clinique et biologique étroite (usage néonatal hospitalier).\",adulte:\"Usage néonatal hospitalier spécifique.\",g:{s:\"ci\",t:\"—\"},a:{s:\"w\",t:\"—\"},r:{s:\"ci\",t:\"Néphrotoxique.\"},h:{s:\"w\",t:\"—\"}},\n     {id:\"amox\",nom:\"Amoxicilline\",cls:ATB,tag:\"Pénicilline A\",ped:{perDayKg:[50,100],prises:3,freq:\"en 3 prises/j — VO ou IVD\",maxJour:4000,note:\"Angine : 50 mg/kg/j en 2 prises. EI : allergie (urticaire, Quincke), troubles digestifs.\"},forms:[{l:\"Susp. 250 mg/5 ml (50 mg/ml)\",c:50},{l:\"Susp. 125 mg/5 ml (25 mg/ml)\",c:25},{l:\"Gélule/cp 500 mg – 1 g\"}],adulte:\"1 g ×2 à 3/j selon l'indication.\",g:{s:\"ok\",t:\"Utilisable.\"},a:{s:\"ok\",t:\"RAS — adapter au rein.\"},r:{s:\"w\",t:\"DFG 10-30 : 2 prises/j · &lt; 10 : 1 prise/j.\"},h:{s:\"ok\",t:\"RAS.\"}},\n     {id:\"amcl\",nom:\"Amoxicilline + ac. clavulanique\",cls:ATB,tag:\"Pénicilline A\",ped:{perDayKg:[80,100],prises:3,freq:\"en 3 prises/j — VO ou IVD (dose en amoxicilline)\",maxJour:3000},forms:[{l:\"Susp. enfant 100 mg/ml\",c:100},{l:\"Sachet/cp 500 mg – 1 g\"}],adulte:\"1 g ×2 à 3/j (max 3 g/j).\",g:{s:\"ok\",t:\"Utilisable.\"},a:{s:\"ok\",t:\"RAS — adapter au rein.\"},r:{s:\"w\",t:\"Comme l'amoxicilline ; éviter si DFG &lt; 10.\"},h:{s:\"w\",t:\"Risque d'hépatite cholestatique — CI si antécédent d'ictère sous clavulanate.\"}},\n     {id:\"ceftri\",nom:\"Ceftriaxone\",cls:ATB,tag:\"C3G · pré-transfert\",urgent:true,ped:{perDayKg:[50,100],prises:1,freq:\"×1/j — IVD (IM possible en pré-transfert)\",maxJour:2000,note:\"Sepsis / méningite suspectée : dose puis évacuation.\"},adulte:\"1 à 2 g ×1/j.\",g:{s:\"ok\",t:\"Utilisable.\"},a:{s:\"ok\",t:\"RAS.\"},r:{s:\"ok\",t:\"RAS aux doses usuelles.\"},h:{s:\"w\",t:\"Prudence si ictère / lithiase (élimination biliaire).\"}},\n     {id:\"cefo\",nom:\"Céfotaxime\",cls:ATB,tag:\"C3G\",ped:{perDayKg:[50,100],prises:2,freq:\"en 2 injections/j — IVD\",maxJour:6000},adulte:\"1 g ×2-3/j IV.\",g:{s:\"ok\",t:\"Utilisable.\"},a:{s:\"ok\",t:\"RAS.\"},r:{s:\"w\",t:\"Espacer si DFG &lt; 10.\"},h:{s:\"ok\",t:\"RAS.\"}},\n     {id:\"genta\",nom:\"Gentamicine\",cls:ATB,tag:\"Aminoside\",urgent:true,ped:{perDayKg:[3,5],prises:2,freq:\"en 2 IV lentes/j (cours) — souvent ×1/j en pratique\",note:\"Néphrotoxicité, toxicité cochléo-vestibulaire : cure courte, hydratation, dosages si &gt; 48 h.\"},adulte:\"3-5 mg/kg/j.\",g:{s:\"w\",t:\"Seulement si indispensable (ototoxicité fœtale).\"},a:{s:\"w\",t:\"Prudence : rein — adapter, dosages.\"},r:{s:\"ci\",t:\"À éviter ; si indispensable : espacer + dosages.\"},h:{s:\"ok\",t:\"RAS (surveiller le rein).\"}},\n     {id:\"netil\",nom:\"Nétilmicine\",cls:ATB,tag:\"Aminoside\",ped:{perDayKg:[5,7],prises:2,freq:\"en 2 IM/j\",note:\"Mêmes précautions que la gentamicine.\"},adulte:\"5-7 mg/kg/j.\",g:{s:\"w\",t:\"Seulement si indispensable.\"},a:{s:\"w\",t:\"Prudence : rein.\"},r:{s:\"ci\",t:\"À éviter ; adapter + dosages.\"},h:{s:\"ok\",t:\"RAS.\"}},\n     {id:\"erythro\",nom:\"Érythromycine\",cls:ATB,tag:\"Macrolide\",ped:{perDayKg:[30,50],prises:3,freq:\"en 2-3 prises/j — VO\",maxJour:3000,note:\"EI : troubles digestifs, allongement du QT, interactions.\"},adulte:\"1 g ×2-3/j.\",g:{s:\"ok\",t:\"Utilisable si nécessaire.\"},a:{s:\"w\",t:\"Prudence si QT long / interactions.\"},r:{s:\"ok\",t:\"RAS.\"},h:{s:\"w\",t:\"Métabolisme hépatique — éviter si IH sévère.\"}},\n     {id:\"josa\",nom:\"Josamycine\",cls:ATB,tag:\"Macrolide\",ped:{perDayKg:[30,50],prises:2,freq:\"en 2 prises/j — VO\",maxJour:2000},adulte:\"1 g ×2/j.\",g:{s:\"ok\",t:\"Utilisable.\"},a:{s:\"ok\",t:\"RAS.\"},r:{s:\"ok\",t:\"RAS.\"},h:{s:\"w\",t:\"Prudence — métabolisme hépatique.\"}},\n     {id:\"azi\",nom:\"Azithromycine\",cls:ATB,tag:\"Macrolide\",ped:{perKg:20,freq:\"1 prise/j pendant 3 jours\",maxPrise:500,maxJour:500},forms:[{l:\"Susp. 200 mg/5 ml (40 mg/ml)\",c:40},{l:\"Cp 250 / 500 mg\"}],adulte:\"500 mg ×1/j ×3 j.\",g:{s:\"ok\",t:\"Possible si nécessaire.\"},a:{s:\"ok\",t:\"Prudence si QT long.\"},r:{s:\"ok\",t:\"RAS.\"},h:{s:\"w\",t:\"Prudence si IH sévère.\"}},\n     {id:\"cefi\",nom:\"Céfixime\",cls:ATB,tag:\"C3G orale\",ped:{perDayKg:8,prises:2,freq:\"en 2 prises/j\",maxJour:400,minM:6},forms:[{l:\"Susp. enfant 100 mg/5 ml (20 mg/ml)\",c:20},{l:\"Susp. nourrisson 40 mg/5 ml (8 mg/ml)\",c:8},{l:\"Cp 200 mg\"}],adulte:\"200 mg ×2/j.\",g:{s:\"ok\",t:\"Utilisable.\"},a:{s:\"ok\",t:\"RAS.\"},r:{s:\"w\",t:\"Demi-dose si DFG &lt; 20.\"},h:{s:\"ok\",t:\"RAS.\"}},\n     {id:\"al\",nom:\"Artéméther-luméfantrine 120/20\",cls:PALU,tag:\"Palu simple · 1ʳᵉ ligne\",bands:[[5,15,1],[15,25,2],[25,35,3],[35,999,4]],bandNote:\"×2/j pendant 3 jours (H0 puis H8, ensuite matin et soir) — avec repas ou lait.\",ped:{minW:5,note:\"Signes de gravité → artésunate + transfert.\"},adulte:\"≥ 35 kg : 4 cp ×2/j ×3 j.\",g:{s:\"w\",t:\"T1 : selon protocole national / avis · T2-T3 : utilisable.\"},a:{s:\"ok\",t:\"RAS.\"},r:{s:\"ok\",t:\"RAS.\"},h:{s:\"w\",t:\"Prudence si IH sévère.\"}},\n     {id:\"artesu\",nom:\"Artésunate\",cls:PALU,tag:\"Palu grave\",urgent:true,ped:{perKg:2.4,freq:\"IV lente à H0, H12, H24, puis ×1/j\",note:\"OMS : 3 mg/kg par dose si poids &lt; 20 kg. Relais ACT dès que possible.\"},adulte:\"2,4 mg/kg même schéma.\",g:{s:\"ok\",t:\"Traitement du palu grave, y compris grossesse.\"},a:{s:\"ok\",t:\"RAS.\"},r:{s:\"ok\",t:\"RAS.\"},h:{s:\"ok\",t:\"RAS.\"}},\n     {id:\"dha\",nom:\"Dihydroartémisinine VO\",cls:PALU,tag:\"Palu simple · ACT (composant DHA)\",ped:{perKg:4,freq:\"×1/j pendant 3 jours (dose exprimée en DHA)\",note:\"En pratique : association fixe DHA–pipéraquine (Eurartesim) — posologie selon le poids sur la notice. Jamais en monothérapie. Signes de gravité → artésunate injectable + transfert.\"},adulte:\"≈ 4 mg/kg/j de DHA ×1/j pendant 3 j (assoc. DHA–pipéraquine).\",g:{s:\"w\",t:\"T1 : avis / protocole national · T2-T3 : utilisable.\"},a:{s:\"ok\",t:\"RAS.\"},r:{s:\"ok\",t:\"RAS.\"},h:{s:\"w\",t:\"Prudence si IH sévère (QT).\"}},\n     {id:\"artesuvo\",nom:\"Artésunate voie orale\",cls:PALU,tag:\"Palu simple · ACT (composant)\",ped:{perKg:4,freq:\"×1/j pendant 3 jours\",maxPrise:200,note:\"Toujours en association (artésunate–amodiaquine…), jamais en monothérapie. Palu grave → artésunate injectable + transfert.\"},adulte:\"≈ 4 mg/kg/j (200 mg) ×1/j pendant 3 j, en association.\",g:{s:\"w\",t:\"T1 : avis · T2-T3 : utilisable.\"},a:{s:\"ok\",t:\"RAS.\"},r:{s:\"ok\",t:\"RAS.\"},h:{s:\"w\",t:\"Prudence.\"}},\n     {id:\"artem\",nom:\"Artéméther IM\",cls:PALU,tag:\"Palu grave · alternative\",urgent:true,multi:[[\"J1 (charge)\",3.2],[\"Puis J2 à J5, par jour\",1.6]],ped:{note:\"Amp. 40 mg/0,5 ml ou 80 mg/1 ml — voie IM. Si artésunate disponible, le préférer.\"},adulte:\"Même schéma en mg/kg.\",g:{s:\"w\",t:\"Si artésunate indisponible.\"},a:{s:\"ok\",t:\"RAS.\"},r:{s:\"ok\",t:\"RAS.\"},h:{s:\"w\",t:\"Prudence.\"}},\n     {id:\"quinine\",nom:\"Quinine base\",cls:PALU,tag:\"Perfusion / VO\",ped:{perDayKg:24,prises:3,freq:\"3 perfusions/j de 8 mg/kg chacune (ou VO)\",note:\"Surveillance : glycémie (hypoglycémie), cardio. Amp. 125/250/500 mg.\"},adulte:\"24 mg/kg/j en 3 perfusions.\",g:{s:\"ok\",t:\"Utilisable (hypoglycémie à surveiller).\"},a:{s:\"w\",t:\"Prudence cardiaque.\"},r:{s:\"w\",t:\"Réduire d'1/3 à 1/2 si IR sévère.\"},h:{s:\"w\",t:\"Prudence, surveiller.\"}},\n     {id:\"sro\",nom:\"SRO — base du traitement\",cls:DIAR,tag:\"Toujours en premier\",fixed:\"Administration <b>précoce<\u002Fb>, après chaque selle liquide : &lt; 2 ans <b>50-100 ml<\u002Fb> · ≥ 2 ans <b>100-200 ml<\u002Fb>, petites gorgées ou cuillère. Associer le <b>zinc<\u002Fb>.\",adulte:\"Boissons abondantes ; SRO si sujet fragile.\",g:{s:\"ok\",t:\"RAS.\"},a:{s:\"ok\",t:\"Recommandé (fragilité).\"},r:{s: etState({theme}); }\n\n  toggleFav(id){\n    this.setState(s=>{\n      const adding=!s.favs.includes(id);\n      const favs=adding?[id,...s.favs]:s.favs.filter(x=>x!==id);\n      try{localStorage.setItem(\"pediadose_favs\",JSON.stringify(favs));}catch(e){}\n      return {favs, lastFav:adding?id:null, favTick:(s.favTick||0)+1};\n    });\n  }\n  addRecent(entry){\n    this.setState(s=>{\n      if(entry.ts==null) entry.ts=Date.now();\n      const key=(e)=>e.type+\"|\"+e.label+\"|\"+(e.w??\"\")+\"|\"+(e.mode??\"\");\n      const k=key(entry);\n      const recents=[entry,...s.recents.filter(r=>key(r)!==k)].slice(0,12);\n      try{localStorage.setItem(\"pediadose_recents\",JSON.stringify(recents));}catch(e){}\n      return {recents};\n    });\n  }\n  clearRecents(){ try{localStorage.setItem(\"pediadose_recents\",\"[]\");}catch(e){} this.setState({recents:[]}); }\n  drugById(id){ return this.DRUGS.find(d=>d.id===id); }\n\n  fmtTime(ts){\n    if(!ts) return \"\";\n    const d=new Date(ts), now=new Date(), diff=(now-d)/1000;\n    const hm=d.getHours().toString().padStart(2,\"0\")+\"h\"+d.getMinutes().toString().padStart(2,\"0\");\n    const sameDay=d.toDateString()===now.toDateString();\n    const yst=new Date(now); yst.setDate(now.getDate()-1);\n    if(diff<60) return \"à l'instant\";\n    if(diff<3600) return \"il y a \"+Math.floor(diff/60)+\" min\";\n    if(sameDay) return \"aujourd'hui · \"+hm;\n    if(d.toDateString()===yst.toDateString()) return \"hier · \"+hm;\n    return d.getDate().toString().padStart(2,\"0\")+\"/\"+(d.getMonth()+1).toString().padStart(2,\"0\")+\" · \"+hm;\n  }\n\n  // Résumé de dose concis pour l'historique (poids/mode courants)\n  quickDose(d){\n    if(this.state.mode===\"adulte\"){ const a=d.adulte||\"\"; return a.length>44?a.slice(0,44)+\"…\":a; }\n    const w=this.wkg(), p=d.ped||{};\n    if(!w) return \"\";\n    if(d.fixed) return \"voir protocole\";\n    if(d.bands){ const b=d.bands.find(x=>w>=x[0]&&w<x[1]); return b?b[2]+\" cp/prise\":\"hors
