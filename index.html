th:440px;min-height:100vh;background:#F6F9F8;position:relative;overflow:hidden;box-shadow:0 0 60px rgba(15,45,40,.12);\">\n\n    <!-- ============ SPLASH (démarrage) ============ -->\n    <sc-if value=\"{{ booting }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"position:absolute;inset:0;z-index:70;background:linear-gradient(160deg,#0f766e 0%,#0b5a54 55%,#094842 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;overflow:hidden;opacity:{{ bootOpacity }};transition:opacity .5s ease;\">\n        <div class=\"bubble\" style=\"position:absolute;top:-70px;right:-60px;width:240px;height:240px;border-radius:50%;background:rgba(255,255,255,.07);animation:floatA 9s ease-in-out infinite;\"><\u002Fdiv>\n        <div class=\"bubble\" style=\"position:absolute;bottom:-50px;left:-70px;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.05);animation:floatB 11s ease-in-out infinite;\"><\u002Fdiv>\n        <div style=\"position:relative;width:132px;height:132px;display:flex;align-items:center;justify-content:center;animation:logoPop 1s cubic-bezier(.2,.9,.25,1.15) both;\">\n          <div style=\"position:absolute;inset:-14px;border-radius:44px;border:2px solid rgba(255,255,255,.35);border-top-color:rgba(255,255,255,.9);animation:spin 2.4s linear infinite;\"><\u002Fdiv>\n          <div style=\"position:absolute;inset:0;border-radius:34px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.28);\"><\u002Fdiv>\n          <svg width=\"64\" height=\"64\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"position:relative;stroke-dasharray:120;stroke-dashoffset:120;animation:draw .85s ease .1s forwards, beat 1.6s ease-in-out 1s infinite;\"><path d=\"M4 11h16\"><\u002Fpath><path d=\"M5 11a7 7 0 0 0 14 0\"><\u002Fpath><path d=\"M12 18v3M8 21h8\"><\u002Fpath><path d=\"M14.5 10 19 4.5\"><\u002Fpath><path d=\"m17.2 3 3 3\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <div style=\"text-align:center;opacity:0;animation:fadeUp .6s ease .4s both;\">\n          <div style=\"font-size:13px;font-weight:800;letter-spacing:.34em;color:#fff;text-transform:uppercase;\">PédiaDose<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:7px;opacity:0;animation:fadeUp .5s ease .65s both;\">\n          <span style=\"width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.5);animation:pulseDot 1.2s ease-in-out infinite;\"><\u002Fspan>\n          <span style=\"width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.5);animation:pulseDot 1.2s ease-in-out .2s infinite;\"><\u002Fspan>\n          <span style=\"width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.5);animation:pulseDot 1.2s ease-in-out .4s infinite;\"><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ============ GATE / LOGIN ============ -->\n    <sc-if value=\"{{ locked }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"position:absolute;inset:0;background:linear-gradient(160deg,#0f766e 0%,#0b5a54 60%,#094842 100%);display:flex;align-items:center;justify-content:center;padding:26px;z-index:50;\">\n        <div style=\"position:absolute;top:-60px;right:-50px;width:240px;height:240px;border-radius:50%;background:rgba(255,255,255,.06);\"><\u002Fdiv>\n        <div style=\"position:absolute;bottom:-40px;left:-60px;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.05);\"><\u002Fdiv>\n        <div style=\"background:#fff;border-radius:28px;padding:30px 24px;width:100%;max-width:360px;box-shadow:0 30px 60px -20px rgba(0,0,0,.4);position:relative;\">\n          <div style=\"width:60px;height:60px;border-radius:18px;background:#e6f2ef;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;\">\n            <svg width=\"30\" height=\"30\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#0f766e\" stroke-width= -align:right;\">${n} cp<\u002Fdiv><\u002Fdiv>`;\n      }\n      t+=`<\u002Fdiv>`; h+=t; h+=this._meta(d.bandNote); if(p.note) h+=this._alert(p.note); return h;\n    }\n    if(d.multi){\n      if(!w) return h+this._empty(\"Entrez le poids ↑\");\n      let inner=d.multi.map(([lb,k])=>`<div class=\"num\" style=\"font-size:14px;font-weight:700;color:#2c534d;margin-top:4px;\"><b style=\"color:#0b5a54;\">${lb} :<\u002Fb> ≈ ${this.fmtMg(k*w)} mg<\u002Fdiv>`).join(\"\");\n      h+=this._panel(inner); if(p.note) h+=this._meta(p.note); return h;\n    }\n    if(d.fixed){ h+=this._panel(`<div style=\"font-size:14px;line-height:1.55;color:#234b45;font-weight:600;\">${d.fixed}<\u002Fdiv>`); if(p.note) h+=this._meta(p.note); return h; }\n    if(!w) return h+this._empty(\"Entrez le poids ↑\");\n\n    const unit=p.unit||\"mg\"; let capped=false, per, extra=\"\";\n    const idx=this.state.formSel[d.id]??0;\n    if(p.perKg!==undefined){\n      per=this.rng(p.perKg).map(k=>k*w);\n      if(unit!==\"mg\") per=per.map(v=>Math.max(1,p.round===\"floor\"?Math.floor(v):Math.round(v)));\n      if(p.maxPrise){ if(per[1]>p.maxPrise) capped=true; per=per.map(v=>Math.min(v,p.maxPrise)); }\n      const f=unit===\"mg\"?(x=>this.fmtMg(x)):(x=>this.fr(x));\n      let inner=this._big(\"≈ \"+this.showRange(per,f), unit, \"/ prise\");\n      inner+=this._freq(p.freq);\n      if(unit===\"mg\"&&p.maxJour){\n        const nb=p.freq.includes(\"6 h\")?4:p.freq.includes(\"8 h\")?3:p.freq.includes(\"12 h\")?2:1;\n        extra=this._meta(`Maximum sur 24 h : ${this.fmtMg(Math.min(per[1]*nb,p.maxJour))} mg.`);\n      }\n      if(d.forms&&unit===\"mg\"){\n        const fm=d.forms[idx];\n        if(fm&&fm.c){ inner+=this._hr(); inner+=this._big(\"≈ \"+this.showRange(per.map(v=>v/fm.c),x=>this.fmtMl(x)),\"ml\",\"/ prise · \"+fm.l); }\n        else if(fm&&!fm.c){ inner+=this._hr()+`<div style=\"font-size:13.5px;font-weight:700;color:#2c534d;\">${fm.l}<\u002Fdiv>`; }\n      }\n      h+=this._panel(inner);\n      if(d.forms&&d.forms.length>1&&unit===\"mg\"){\n        h+=`<select data-form=\"${d.id}\" style=\"margin-top:10px;width:100%;padding:10px 12px;border:1.5px solid #dce8e4;border-radius:12px;font-size:13.5px;font-weight:600;background:#fff;color:#10221f;font-family:inherit;\">`+\n          d.forms.map((o,i)=>`<option value=\"${i}\"${i===idx?\" selected\":\"\"}>${o.l}<\u002Foption>`).join(\"\")+`<\u002Fselect>`;\n      }\n      h+=extra;\n    } else {\n      let day=this.rng(p.perDayKg).map(k=>k*w);\n      if(p.maxJour){ if(day[1]>p.maxJour) capped=true; day=day.map(v=>Math.min(v,p.maxJour)); }\n      per=day.map(v=>v/(p.prises||1));\n      let inner=this._big(\"≈ \"+this.showRange(day,x=>this.fmtMg(x)),\"mg / jour\",\"\");\n      inner+=this._freq(\"— \"+p.freq);\n      if((p.prises||1)>1) inner+=`<div class=\"num\" style=\"font-size:13.5px;font-weight:700;color:#2c534d;margin-top:6px;\">soit ≈ <b style=\"color:#0b5a54;\">${this.showRange(per,x=>this.fmtMg(x))} mg / prise<\u002Fb> ×${p.prises}<\u002Fdiv>`;\n      if(d.forms){\n        const fm=d.forms[idx];\n        if(fm&&fm.c){ inner+=this._hr(); inner+=this._big(\"≈ \"+this.showRange(per.map(v=>v/fm.c),x=>this.fmtMl(x)),\"ml\",\"/ prise · \"+fm.l); }\n      }\n      h+=this._panel(inner);\n      if(d.forms&&d.forms.length>1){\n        h+=`<select data-form=\"${d.id}\" style=\"margin-top:10px;width:100%;padding:10px 12px;border:1.5px solid #dce8e4;border-radius:12px;font-size:13.5px;font-weight:600;background:#fff;color:#10221f;font-family:inherit;\">`+\n          d.forms.map((o,i)=>`<option value=\"${i}\"${i===idx?\" selected\":\"\"}>${o.l}<\u002Foption>`).join(\"\")+`<\u002Fselect>`;\n      }\n    }\n    if(capped) h+=this._cap(\"Plafond appliqué — dose maximale atteinte\");\n    if(p.note) h+=this._meta(p.note);\n    return h;\n  }\n\n  adultBlock(d){\n    return `<div style=\"margin-top:14px;background:#e6f2ef;border-radius:16px;padding:14px 16px;font-size:14.5px;line-height:1.5;color:#234b45;\"><b style=\"color:#0b5a54;\">Dose adulte :<\u002Fb> ${d.adulte}<\u002Fdiv>`+this.terrRows(d);\n  }\n\n  makeDoseEl(d){\n    const html = this.state.mode===\"enfant\" ? this.pedBlock(d) : this.adultBlock(d);\n    return React.createElement(\"div\",{\n      dangerouslySetInnerHTML:{__html:html},\n      onChange:(e)=>{ const id=e.target&&e.target.getAttribute&&e.target.getAttribute(\"data-form\"); if(id){ this.setState(s=>({formSel:{...s.formSel,[id]:+e.target.value}})); } }\n    });\n  }\n\n  renderVals(){\n    const S=this.state, self=this;\n    const gotoCalc=(patch)=>this.setState({screen:\"calc\",...(patch||{})});\n    const clsColor=(active)=> active?\"background:#0f766e;color:#fff;border:1px solid #0f766e;\":\"background:#fff;color:#5c726e;border:1px solid #dce8e4;\";\n    const pill=(active)=>`flex:none;border-radius:999px;padding:8px 15px;font-size:12.5px;font-weight:700;cursor:pointer;white-space:nowrap;${clsColor(active)}`;\n    const modeBtn=(active)=>`flex:1;text-align:center;padding:9px;border-radius:11px;font-weight:700;font-size:14px;cursor:pointer;${active?\"background:#0f766e;color:#fff;box-shadow:0 6px 14px -6px rgba(15,118,110,.7);\":\"color:#5c726e;\"}`;\n\n    // cards\n    const w=this.wkg();\n    const cards=this.DRUGS.filter(d=>{\n      if(S.cls!==\"Tout\"&&d.cls!==S.cls) return false;\n      if(S.q&&!(d.nom+\" \"+d.tag+\" \"+d.cls).toLowerCase().includes(S.q.toLowerCase())) return false;\n      return true;\n    }).map(d=>({\n      nom:d.nom, tag:d.tag, hosp:!!d.hosp,\n      tagStyle:`font-size:9.5px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;border-radius:7px;padding:4px 7px;${d.urgent?\"color:#b91c1c;background:#fdecec;\":\"color:#0f766e;background:#e6f2ef;\"}`,\n      favFill:S.favs.includes(d.id)?\"#0f766e\":\"none\",\n      favStroke:S.favs.includes(d.id)?\"#0f766e\":\"#c3d3cf\",\n      onFav:()=>this.toggleFav(d.id),\n      doseEl:this.makeDoseEl(d),\n    }));\n\n    const openDrug=(d)=>{ this.addRecent({type:\"drug\",label:d.nom,q:d.nom}); this.setState({screen:\"calc\",q:d.nom,cls:\"Tout\"}); };\n    const favList=this.state.favs.map(id=>this.drugById(id)).filter(Boolean).map(d=>({\n      nom:d.nom, sub:d.cls, tag:d.tag,\n      tagStyle:`font-size:9.5px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;border-radius:7px;padding:4px 7px;color:#0f766e;background:#e6f2ef;`,\n      onOpen:()=>openDrug(d), onRemove:()=>this.toggleFav(d.id),\n    }));\n    const recIcon={drug:\"pill\",cls:\"layers\",q:\"search\"};\n    const recentsFull=this.state.recents.map(r=>({\n      label:r.label, sub:r.type===\"cls\"?\"Classe\":r.type===\"drug\"?\"Médicament\":\"Recherche\", kind:r.type,\n      onClick:()=>{ if(r.type===\"cls\") this.setState({screen:\"calc\",cls:r.cls,q:\"\"}); else this.setState({screen:\"calc\",q:r.q||r.label,cls:\"Tout\"}); },\n    }));\n    const recentChips=recentsFull.slice(0,5);\n\n    const terrChip=(k,label)=>({label,onClick:()=>this.setState(s=>({terr:{...s.terr,[k]:!s.terr[k]}})),\n      style:`border-radius:999px;padding:7px 13px;font-size:12.5px;font-weight:700;cursor:pointer;${S.terr[k]?\"background:#0f766e;color:#fff;border:1px solid #0f766e;\":\"background:#fff;color:#5c726e;border:1.5px solid #dce8e4;\"}`});\n\n    return {\n      locked:S.locked, unlocked:!S.locked,\n      isHome:S.screen===\"home\", isCalc:S.screen===\"calc\",\n      isFav:S.screen===\"favoris\", isProfil:S.screen===\"profil\", isRecents:S.screen===\"recents\",\n      welcoming:S.welcomePhase!=null, welcomeOpacity:S.welcomePhase===\"out\"?0:1,\n      booting:S.bootPhase!=null, bootOpacity:S.bootPhase===\"out\"?0:1,\n      // gate\n      ordreVal:S.ordreVal,\n      onOrdre:(e)=>this.setState({ordreVal:e.target.value}),\n      onOrdreKey:(e)=>{ if(e.key===\"Enter\") this.tryLogin(); },\n      onLogin:()=>this.tryLogin(),\n      gateErr:!!S.gateErr,\n      gateErrEl:React.createElement(\"span\",null,S.gateErr),\n      // home\n      greeting:this.greeting(), who:S.who, ordre:S.ordre, initials:this.initials().toUpperCase(),\n      mode:S.mode, isAdulte:S.mode===\"adulte\", showAge:S.mode===\"enfant\",\n      toggleShift:S.mode===\"enfant\"?\"translateX(0)\":\"translateX(100%)\",\n      enfantColor:S.mode===\"enfant\"?\"#fff\":\"#5c726e\",\n      adulteColor:S.mode===\"adulte\"?\"#fff\":\"#5c726e\",\n      onEnfant:()=>this.setState({mode:\"enfant\"}), onAdulte:()=>this.setState({mode:\"adulte\"}),\n      weight:S.weight, age:S.age,\n      onWeight:(e)=>this.setState({weight:e.target.value}),\n      onAge:(e)=>this.setState({age:e.target.value}),\n      onVoir:()=>gotoCalc(),\n      urgences:[\n        {nom:\"Ceftriaxone\",sub:\"Sepsis\",onClick:()=>{this.addRecent({type:\"drug\",label:\"Ceftriaxone\",q:\"Ceftriaxone\"});gotoCalc({q:\"Ceftriaxone\",cls:\"Tout\"});}},\n        {nom:\"Artésunate\",sub:\"Palu grave\",onClick:()=>{this.addRecent({type:\"drug\",label:\"Artésunate\",q:\"Artésunate\"});gotoCalc({q:\"Artésunate\",cls:\"Tout\"});}},\n        {nom:\"Diazépam\",sub:\"Crise\",onClick:()=>{this.addRecent({type:\"drug\",label:\"Diazépam\",q:\"Diazépam\"});gotoCalc({q:\"Diazépam\",cls:\"Tout\"});}},\n      ],\n      classGrid:[\n        {abbr:\"ATB\",label:\"Antibiotiques\",onClick:()=>{this.addRecent({type:\"cls\",label:this.C.ATB,cls:this.C.ATB});gotoCalc({cls:this.C.ATB,q:\"\"});}},\n        {abbr:\"PAL\",label:\"Antipaludiques\",onClick:()=>{this.addRecent({type:\"cls\",label:this.C.PALU,cls:this.C.PALU});gotoCalc({cls:this.C.PALU,q:\"\"});}},\n        {abbr:\"°\",label:\"Antipyrétiques\",onClick:()=>{this.addRecent({type:\"cls\",label:this.C.AP,cls:this.C.AP});gotoCalc({cls:this.C.AP,q:\"\"});}},\n        {abbr:\"✚\",label:\"Corticoïdes\",onClick:()=>{this.addRecent({type:\"cls\",label:this.C.CORT,cls:this.C.CORT});gotoCalc({cls:this.C.CORT,q:\"\"});}},\n        {abbr:\"HTA\",label:\"Antihypertenseurs\",onClick:()=>{this.addRecent({type:\"cls\",label:this.C.HTA,cls:this.C.HTA});gotoCalc({cls:this.C.HTA,q:\"\"});}},\n        {abbr:\"DIA\",label:\"Antidiarrhéiques\",onClick:()=>{this.addRecent({type:\"cls\",label:this.C.DIAR,cls:this.C.DIAR});gotoCalc({cls:this.C.DIAR,q:\"\"});}},\n      ],\n      recentChips, hasRecents:recentsFull.length>0, recentsFull, hasRecentsFull:recentsFull.length>0,\n      onOpenRecents:()=>this.setState({screen:\"recents\"}),\n      onClearRecents:()=>this.clearRecents(),\n      favList, hasFavs:favList.length>0, noFavs:favList.length===0, favCount:favList.length,\n      noRecents:recentsFull.length===0,\n      onContact:()=>{ try{window.open(\"mailto:\"+this.CONTACT,\"_blank\");}catch(e){} },\n      onOpenFav:()=>this.setState({screen:\"favoris\"}),\n      onOpenProfil:()=>this.setState({screen:\"profil\"}),\n      scClass:S.theme===\"garde\"?\"night\":\"\",\n      isJour:S.theme===\"jour\", isGarde:S.theme===\"garde\",\n      jourStyle:`flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:9px;border-radius:11px;font-weight:800;font-size:13.5px;cursor:pointer;${S.theme===\"jour\"?\"background:#0f766e;color:#fff;box-shadow:0 6px 14px -6px rgba(15,118,110,.7);\":\"color:#5c726e;\"}`,\n      gardeStyle:`flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:9px;border-radius:11px;font-weight:800;font-size:13.5px;cursor:pointer;${S.theme===\"garde\"?\"background:#0f766e;color:#fff;box-shadow:0 6px 14px -6px rgba(15,118,110,.7);\":\"color:#5c726e;\"}`,\n      onJour:()=>this.setTheme(\"jour\"), onGarde:()=>this.setTheme(\"garde\"),\n      // calc\n      calcTitle:S.cls===\"Tout\"?\"Posologies\":S.cls,\n      wLabel:S.weight?(this.fr(S.weight)+\" kg\"):\"— kg\",\n      secondLabel:S.mode===\"enfant\"?\"Âge\":\"Mode\",\n      secondVal:S.mode===\"enfant\"?(S.age?S.age+\" mois\":\"— mois\"):\"Terrains\",\n      modeLabel:S.mode===\"enfant\"?\"Enfant\":\"Adulte\",\n      onSwapMode:()=>this.setState(s=>({mode:s.mode===\"enfant\"?\"adulte\":\"enfant\"})),\n      onBack:()=>this.setState({screen:\"home\"}),\n      terrChips:[terrChip(\"g\",\"Grossesse\"),terrChip(\"a\",\"Sujet âgé\"),terrChip(\"r\",\"Rein (IR)\"),terrChip(\"h\",\"Foie (IH)\")],\n      clsPills:this.CLASSES.map(c=>({name:c,style:pill(c===S.cls),onClick:()=>this.setState({cls:c})})),\n      clsNote:this.CLASS_NOTES[S.cls]||\"\",\n      q:S.q, onSearch:(e)=>this.setState({q:e.target.value}),\n      onSearchEnter:(e)=>{ if(e.key===\"Enter\"&&S.q.trim()) this.addRecent({type:\"q\",label:S.q.trim(),q:S.q.trim()}); },\n      overWeight:S.mode===\"enfant\"&&w>45,\n      cards, noResults:cards.length===0,\n      // nav\n      navHomeColor:S.screen===\"home\"?\"#0f766e\":\"#9db2ad\",\n      navSearchColor:S.screen===\"calc\"?\"#0f766e\":\"#9db2ad\",\n      navFavColor:(S.screen===\"favoris\"||S.screen===\"recents\")?\"#0f766e\":\"#9db2ad\",\n      navProfilColor:S.screen===\"profil\"?\"#0f766e\":\"#9db2ad\",\n      onNavHome:()=>this.setState({screen:\"home\"}),\n      onNavSearch:()=>this.setState({screen:\"calc\"}),\n      onNavFav:()=>this.setState({screen:\"favoris\"}),\n      onNavProfil:()=>this.setState({screen:\"profil\"}),\n      onLogout:()=>this.logout(),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
